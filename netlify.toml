# AZM Lending Calculator - Netlify
# Builds dist/ via npm run build:dist (afford/, live/, root index)

[build]
  command = "npm run build:dist"
  publish = "dist"

[[redirects]]
  from = "/afford"
  to = "/afford/"
  status = 301

[[redirects]]
  from = "/live"
  to = "/live/"
  status = 301

# Legacy filenames -> canonical paths
[[redirects]]
  from = "/affordweb.html"
  to = "/afford/"
  status = 301

[[redirects]]
  from = "/affordfunnel.html"
  to = "/afford/"
  status = 301

[[redirects]]
  from = "/simple.html"
  to = "/live/"
  status = 301

[[redirects]]
  from = "/simple-standalone.html"
  to = "/live/"
  status = 301
